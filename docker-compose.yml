# One `podman compose up -d` brings up the entire hub. Dev = test = production — same image.
services:
  worko-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worko-server
    ports:
      - "8080:8080"
    volumes:
      - worko-data:/data
      - ./dashboard/dist:/app/dashboard/dist:ro   # mount the pre-built dashboard
    environment:
      - PORT=8080
      - DB_PATH=/data/worko.db
      - WORKO_ADMIN_TOKEN=${WORKO_ADMIN_TOKEN:-change-me}   # must be changed!
      - PUBLIC_DIR=/app/dashboard/dist
    restart: unless-stopped

volumes:
  worko-data:
