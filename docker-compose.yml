# 一条 `podman compose up -d` 起整个 hub。开发=测试=部署同一个镜像。
services:
  worko-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worko-server
    ports:
      - "8080:8080"          # HTTP + WebSocket 同口，绑 0.0.0.0 → 别的机器能连
    volumes:
      - worko-data:/data     # SQLite 持久化
    environment:
      - PORT=8080
      - DB_PATH=/data/worko.db
      - WORKO_TOKEN=${WORKO_TOKEN:-dev-secret}   # 一上公网必须设；从 .env 读
    restart: unless-stopped

volumes:
  worko-data:
