# 一条 `podman compose up -d` 起整个 hub。开发=测试=部署同一个镜像。
services:
  worko-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worko-server
    ports:
      - "8080:8080"
    volumes:
      - worko-data:/data
      - ./dashboard/dist:/app/dashboard/dist:ro   # 挂载构建好的 dashboard
    environment:
      - PORT=8080
      - DB_PATH=/data/worko.db
      - WORKO_ADMIN_TOKEN=${WORKO_ADMIN_TOKEN:-change-me}   # 必须改！
      - PUBLIC_DIR=/app/dashboard/dist
    restart: unless-stopped

volumes:
  worko-data:
